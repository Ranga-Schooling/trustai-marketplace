name: Auto request review

on:
  pull_request:
    types: [opened, ready_for_review]

permissions:
  pull-requests: write
  contents: read

jobs:
  request-developers:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Assign and request review from collaborators
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = context.payload.pull_request.number;
            const author = context.payload.pull_request.user.login.toLowerCase();

            // Use repo collaborators with write+ access (Developers group members).
            // GITHUB_TOKEN cannot always read closed org teams, so we avoid team APIs.
            const collaborators = await github.paginate(
              github.rest.repos.listCollaborators,
              { owner, repo, affiliation: "all", per_page: 100 }
            );

            const candidates = collaborators
              .filter((user) => user.permissions?.push || user.permissions?.maintain || user.permissions?.admin)
              .map((user) => user.login)
              .filter((login) => login.toLowerCase() !== author);

            if (candidates.length === 0) {
              core.info("No collaborators available to assign/request.");
              return;
            }

            core.info(`Candidates: ${candidates.join(", ")}`);

            try {
              await github.rest.issues.addAssignees({
                owner,
                repo,
                issue_number: pull_number,
                assignees: candidates,
              });
              core.info(`Assigned: ${candidates.join(", ")}`);
            } catch (error) {
              core.warning(`Could not add assignees: ${error.message}`);
            }

            try {
              await github.rest.pulls.requestReviewers({
                owner,
                repo,
                pull_number,
                reviewers: candidates,
              });
              core.info(`Requested reviewers: ${candidates.join(", ")}`);
            } catch (error) {
              core.warning(`Could not request reviewers: ${error.message}`);
            }
